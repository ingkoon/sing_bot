name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # 수동 배포 트리거

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # GHCR push 권한
    steps:
      - uses: actions/checkout@v4

      # GHCR 네임스페이스는 소문자만 허용 → repository_owner 를 소문자로 변환
      - name: Resolve lowercase image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/sing_bot" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 저장소의 docker-compose.yml 에서 <OWNER> 를 실제(소문자) 계정으로 치환.
      # 이 파일이 EC2 로 복사되므로, EC2 에 compose 를 수동 배치할 필요가 없어진다.
      - name: Render docker-compose.yml
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          sed -i "s/<OWNER>/${OWNER}/g" docker-compose.yml
          echo "----- rendered docker-compose.yml -----"
          cat docker-compose.yml

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          passphrase: ${{ secrets.EC2_SSH_PASSPHRASE }}
          source: docker-compose.yml
          target: ~/sing_bot/

      - name: SSH into EC2 and roll out
        uses: appleboy/ssh-action@v1
        env:
          # GitHub Secret 을 원격 셸로 env 로 전달 (스크립트 텍스트에 보간하지 않음 → 더 안전)
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          passphrase: ${{ secrets.EC2_SSH_PASSPHRASE }}
          envs: DISCORD_TOKEN,GHCR_USER,GHCR_TOKEN
          script: |
            set -e
            cd ~/sing_bot
            # Secret 값을 EC2 의 .env 파일로 생성 (compose 가 env_file 로 읽어 컨테이너에 주입)
            printf 'DISCORD_TOKEN=%s\n' "$DISCORD_TOKEN" > .env
            chmod 600 .env
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker compose pull
            docker compose up -d
            docker image prune -f
