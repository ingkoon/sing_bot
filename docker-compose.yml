# EC2 호스트에서 사용하는 compose 파일.
# 이미지는 GitHub Actions가 GHCR로 push하고, EC2는 pull만 한다.
services:
  sing-bot:
    # <OWNER>를 본인 GitHub 사용자/조직명(소문자)으로 교체 (예: ghcr.io/ingkoon/sing_bot)
    image: ghcr.io/<OWNER>/sing_bot:latest
    container_name: sing-bot
    restart: unless-stopped
    env_file:
      - .env            # DISCORD_TOKEN=...
    environment:
      # PO Token 공급자(사이드카) 위치. 같은 compose 네트워크의 서비스명으로 접근.
      - BGUTIL_POT_BASE_URL=http://bgutil-provider:4416
      # 유튜브 쿠키 사용 시 주석 해제 (아래 volumes 도 함께)
      # - YTDLP_COOKIES=/app/cookies.txt
    # 유튜브 쿠키(버리는 계정 권장)를 호스트에서 마운트
    # volumes:
    #   - ./cookies.txt:/app/cookies.txt:ro
    depends_on:
      - bgutil-provider
    # 봇은 아웃바운드 전용이므로 노출 포트가 필요 없음
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # PO Token(Proof-of-Origin) 공급자. 데이터센터 IP에서 봇 차단 우회에 필요.
  # 내부 4416 포트로 sing-bot 과만 통신하므로 호스트에 포트를 노출하지 않는다.
  bgutil-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    container_name: bgutil-provider
    restart: unless-stopped
    init: true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
